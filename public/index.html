<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.app{max-width:560px;margin:0 auto;padding:16px}
h1{font-size:24px;font-weight:800;color:#fff;text-align:center}
h2{font-size:15px;font-weight:600;color:#38bdf8}
.card{background:#1e293b;border-radius:10px;padding:14px;margin-bottom:12px}
.card h2{margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #334155}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:11px;color:#94a3b8;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px;border:1px solid #334155;border-radius:6px;background:#0f172a;color:#e2e8f0;font-size:14px}
.fg input:focus{border-color:#38bdf8;outline:none}
.btn{padding:8px 16px;border:none;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer}
.btn:active{transform:scale(.97)}
.bp{background:#0ea5e9;color:#fff}.bs{background:#22c55e;color:#fff}
.bd{background:#dc2626;color:#fff}.by{background:#f59e0b;color:#fff}
.bg{background:#334155;color:#94a3b8}.bv{background:#8b5cf6;color:#fff}
.btn.full{width:100%}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;display:inline-block}
.badge.green{background:#065f46;color:#6ee7b7}.badge.red{background:#7f1d1d;color:#fca5a5}
.badge.yellow{background:#78350f;color:#fcd34d}.badge.blue{background:#1e3a5f;color:#93c5fd}
.badge.gray{background:#374151;color:#d1d5db}
.stat{background:#0f172a;border-radius:8px;padding:12px;text-align:center;flex:1;min-width:80px}
.stat .v{font-size:22px;font-weight:800;font-family:monospace}
.stat .l{font-size:9px;color:#94a3b8;text-transform:uppercase;margin-top:4px;letter-spacing:1px}
.msg{padding:10px;border-radius:8px;margin-bottom:12px;font-size:12px;font-weight:600;text-align:center;cursor:pointer}
.msg.ok{background:#166534;color:#fff}.msg.er{background:#991b1b;color:#fff}
.row{display:flex;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap}
.tabs button{padding:6px 12px;background:#1e293b;border:none;border-radius:6px;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer}
.tabs button.active{background:#f59e0b;color:#0f172a}
.tabs button.activeb{background:#38bdf8;color:#0f172a}
.mono{font-family:monospace}.gold{color:#fbbf24}
.dv{border-top:1px solid #334155;margin-top:10px;padding-top:10px}
.ft{text-align:center;font-size:10px;color:#64748b;padding:12px 0}
.logrow{background:#1e293b;border-radius:6px;padding:8px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.logrow .meta{font-size:9px;color:#64748b;text-align:right}
.price-box{background:linear-gradient(135deg,#14532d,#166534);border:2px solid #22c55e;border-radius:12px;padding:16px;margin-bottom:12px;text-align:center}
.price-box .amt{font-size:36px;font-weight:800;color:#fff}
.warn{background:#7f1d1d;border:1px solid #dc2626;border-radius:6px;padding:8px;font-size:10px;color:#fca5a5}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SB_URL='https://sdviemivuftnsytmnqaq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkdmllbWl2dWZ0bnN5dG1ucWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzAwMTcsImV4cCI6MjA4ODYwNjAxN30.iRSuCtEullsSaV_1hYAqPj_sywXdy-4U3WfHjIYCB4U';

async function dbGet(table,query){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${query||'select=*'}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Accept':'application/json'}});
  if(!r.ok)throw new Error(await r.text());return r.json();
}
async function dbPost(table,data){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation','Accept':'application/json'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());return r.json();
}
async function dbPatch(table,query,data){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${query}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());return null;
}
async function dbDelete(table,query){
  await fetch(`${SB_URL}/rest/v1/${table}?${query}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
}
async function addLog(action,key,chip,details){
  try{await dbPost('logs',{action,license_key:key||null,chip_id:chip||null,details:details||''});}catch(e){}
}
function genKey(){const c='ABCDEFGHJKMNPQRSTUVWXYZ23456789';const s=()=>Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');return'NR-'+s()+'-'+s()+'-'+s();}
function $(id){return document.getElementById(id)}
function fmtDate(d){return d?new Date(d).toLocaleString():'-'}
function badge(s){const c={active:'green',inactive:'yellow',suspended:'red',revoked:'gray',pending:'yellow',approved:'green',rejected:'red'};return'<span class="badge '+(c[s]||'gray')+'">'+s+'</span>';}
function copyKey(k){try{navigator.clipboard.writeText(k)}catch(e){}showMsg('ok','Copied: '+k)}

let state={page:'landing',user:null,userType:null,msg:null,tab:'licenses',adminTab:'dashboard'};
let siteSettings={};let tapCount=0,tapTimer=null;
function showMsg(t,m){state.msg={t,m};render();setTimeout(()=>{state.msg=null;render()},4000)}
function nav(p){state.page=p;state.msg=null;render()}
function logoTap(){tapCount++;if(tapTimer)clearTimeout(tapTimer);if(tapCount>=5){tapCount=0;nav('adminLogin');return;}tapTimer=setTimeout(()=>{tapCount=0},2000);}
function logout(){state.user=null;state.userType=null;nav('landing')}

function render(){
  const a=$(  'app');let h='';
  if(state.msg)h+='<div class="msg '+state.msg.t+'" onclick="state.msg=null;render()">'+state.msg.m+'</div>';
  if(state.page==='landing')h+=renderLanding();
  else if(state.page==='customerLogin')h+=renderLogin('Customer Login','#38bdf8','doLogin');
  else if(state.page==='register')h+=renderRegister();
  else if(state.page==='adminLogin')h+=renderLogin('Developer Login','#f59e0b','doAdminLogin');
  else if(state.page==='customer')h+=renderCustomer();
  else if(state.page==='admin')h+=renderAdmin();
  else h+=renderLanding();
  a.innerHTML=h;
  if(state.page==='customer')setTimeout(loadCustData,100);
  if(state.page==='admin')setTimeout(loadAdminData,100);
}

function renderLanding(){
  const S=siteSettings;
  return '<div style="text-align:center;padding:30px 0 16px"><div onclick="logoTap()" style="font-size:13px;color:#f59e0b;font-weight:700;letter-spacing:3px;cursor:default;user-select:none">N&R SOLARTECH</div><h1 style="margin-top:6px">4in1 Smart CarWash</h1><p style="color:#94a3b8;font-size:14px;margin-top:6px">ESP32-Powered Vending Machine Controller</p></div>'
  +(S.announcement?'<div style="background:#78350f;border:1px solid #f59e0b;border-radius:10px;padding:10px;margin-bottom:12px;text-align:center;font-size:12px;color:#fcd34d;font-weight:600">'+S.announcement+'</div>':'')
  +'<div class="card"><h2>Features</h2>'+['4 Independent Services','Universal Coin Acceptor','Web Dashboard Config','Telegram Monitoring','LCD or 7-Segment Display','Online Licensing'].map(function(f){return'<div style="display:flex;align-items:center;gap:8px;padding:5px 0"><span style="color:#22c55e">✓</span><span style="font-size:13px">'+f+'</span></div>'}).join('')+'</div>'
  +'<div class="card"><h2>Download Firmware</h2><div class="g2"><button class="btn bp full" style="padding:12px">LCD<div style="font-size:9px;opacity:.7;margin-top:2px">'+(S.lcd_version||'')+'</div></button><button class="btn bv full" style="padding:12px">7-Segment<div style="font-size:9px;opacity:.7;margin-top:2px">'+(S.seg_version||'')+'</div></button></div>'+(S.flash_instructions?'<details style="margin-top:8px"><summary style="font-size:11px;color:#94a3b8;cursor:pointer">Instructions</summary><pre style="font-size:10px;color:#cbd5e1;background:#0f172a;border-radius:6px;padding:8px;margin-top:4px;white-space:pre-wrap;font-family:monospace">'+S.flash_instructions+'</pre></details>':'')+'</div>'
  +'<div class="price-box"><div style="font-size:12px;color:#86efac;font-weight:600">ONE-TIME PAYMENT</div><div class="amt">₱'+(S.price||500)+'</div><div style="font-size:12px;color:#bbf7d0;margin-top:4px">Lifetime License • Both Versions • Free Transfers</div></div>'
  +'<div class="card"><h2>Payment Methods</h2>'+[{n:'GCash',num:'0946-536-3493',h:'Raul Alonzo'},{n:'Maya',num:'0995-615-6375',h:'Raul Alonzo'},{n:'BDO',num:'0012-3456-7890',h:'N&R Solartech'}].map(function(p){return'<div style="background:#0f172a;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center"><div><div style="color:#f59e0b;font-weight:700;font-size:12px">'+p.n+'</div><div style="color:#94a3b8;font-size:10px">'+p.h+'</div></div><div class="mono" style="color:#e2e8f0;font-weight:700;font-size:13px">'+p.num+'</div></div>'}).join('')+'</div>'
  +'<div class="g2" style="margin-bottom:12px"><button class="btn full" style="padding:12px;background:#1e293b;border:2px solid #38bdf8;color:#38bdf8;font-weight:700;font-size:13px" onclick="nav(\'customerLogin\')">Customer Login</button><button class="btn bp full" style="padding:12px;font-size:13px" onclick="nav(\'register\')">Register</button></div>'
  +'<div class="ft">N&R SOLARTECH | 09465363493 / 09956156375</div>';
}

function renderLogin(title,color,fn){
  return'<div style="min-height:80vh;display:flex;align-items:center;justify-content:center"><div class="card" style="width:100%;max-width:380px;padding:24px"><div style="text-align:center;margin-bottom:20px"><div style="font-size:11px;color:#f59e0b;font-weight:700;letter-spacing:2px">N&R SOLARTECH</div><h2 style="color:'+color+';font-size:18px;margin-top:6px;border:none;padding:0">'+title+'</h2></div><div class="fg"><label>Email</label><input type="email" id="em" placeholder="your@email.com"></div><div class="fg"><label>Password</label><input type="password" id="pw"></div><button class="btn full" style="background:'+color+';color:#fff;padding:12px;font-size:14px;margin-top:4px" onclick="'+fn+'()">'+title+'</button><button class="btn bg full" style="margin-top:8px" onclick="nav(\'landing\')">Back</button></div></div>';
}

function renderRegister(){
  return'<div style="min-height:80vh;display:flex;align-items:center;justify-content:center"><div class="card" style="width:100%;max-width:380px;padding:24px"><div style="text-align:center;margin-bottom:20px"><div style="font-size:11px;color:#f59e0b;font-weight:700;letter-spacing:2px">N&R SOLARTECH</div><h2 style="color:#22c55e;font-size:18px;margin-top:6px;border:none;padding:0">Register</h2></div><div class="fg"><label>Full Name</label><input id="rn" placeholder="Juan Dela Cruz"></div><div class="fg"><label>Phone</label><input id="rp" placeholder="09171234567"></div><div class="fg"><label>Email</label><input type="email" id="re" placeholder="your@email.com"></div><div class="fg"><label>Password</label><input type="password" id="rpw"></div><button class="btn bs full" style="padding:12px;font-size:14px;margin-top:4px" onclick="doRegister()">Register</button><button class="btn bg full" style="margin-top:8px" onclick="nav(\'landing\')">Back</button></div></div>';
}

async function doLogin(){
  const e=$('em').value,p=$('pw').value;if(!e||!p){showMsg('er','Fill all fields');return;}
  try{const r=await dbGet('customers','email=eq.'+encodeURIComponent(e)+'&password_hash=eq.'+encodeURIComponent(p)+'&select=*');
  if(!r||!r.length){showMsg('er','Invalid email or password');return;}
  state.user=r[0];state.userType='customer';nav('customer');}catch(e){showMsg('er','Connection error: '+e.message);}
}

async function doAdminLogin(){
  const e=$('em').value,p=$('pw').value;
  try{const r=await dbGet('admins','email=eq.'+encodeURIComponent(e)+'&password_hash=eq.'+encodeURIComponent(p)+'&select=*');
  if(!r||!r.length){showMsg('er','Invalid credentials');return;}
  state.user=r[0];state.userType='admin';nav('admin');}catch(e){showMsg('er','Connection error: '+e.message);}
}

async function doRegister(){
  const n=$('rn').value,p=$('rp').value,e=$('re').value,pw=$('rpw').value;
  if(!n||!e||!pw){showMsg('er','Name, email, password required');return;}
  try{const ex=await dbGet('customers','email=eq.'+encodeURIComponent(e)+'&select=id');
  if(ex&&ex.length){showMsg('er','Email already registered');return;}
  const r=await dbPost('customers',{name:n,phone:p||'',email:e,password_hash:pw});
  state.user=r[0];state.userType='customer';nav('customer');}catch(e){showMsg('er','Error: '+e.message);}
}

function renderCustomer(){
  const u=state.user;if(!u){nav('landing');return'';}
  return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><div style="color:#38bdf8;font-size:16px;font-weight:700">My Account</div><div style="color:#94a3b8;font-size:11px">Welcome, '+u.name+'</div></div><div class="row"><button class="btn bg" onclick="nav(\'landing\')" style="font-size:10px;padding:5px 10px">Home</button><button class="btn bd" onclick="logout()" style="font-size:10px;padding:5px 10px">Logout</button></div></div>'
  +'<div class="tabs">'+[['licenses','My Licenses'],['buy','Buy License'],['logs','Activity']].map(function(t){return'<button class="'+(state.tab===t[0]?'activeb':'')+'" onclick="state.tab=\''+t[0]+'\';loadCustData()">'+t[1]+'</button>'}).join('')+'</div>'
  +'<div id="cc"><div style="text-align:center;padding:30px;color:#64748b">Loading...</div></div>';
}

async function loadCustData(){
  const el=$('cc');if(!el)return;
  if(state.tab==='licenses'){
    try{const r=await dbGet('licenses','customer_id=eq.'+state.user.id+'&select=*');const lics=r||[];
    let h='<div class="card" style="margin-bottom:8px"><div style="color:#94a3b8;font-size:11px;margin-bottom:6px">Claim a license key:</div><div style="display:flex;gap:6px"><input id="ck" placeholder="NR-XXXX-XXXX-XXXX" class="mono gold" style="flex:1;text-transform:uppercase;text-align:center;padding:8px;background:#0f172a;border:1px solid #334155;border-radius:6px;font-size:13px"><button class="btn bs" onclick="claimKey()">Claim</button></div></div>';
    if(!lics.length)h+='<div style="text-align:center;color:#64748b;padding:30px">No licenses yet.</div>';
    lics.forEach(function(l){
      var bc=l.status==='active'?'#22c55e':l.status==='suspended'?'#dc2626':'#f59e0b';
      h+='<div class="card" style="border:1px solid '+bc+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><span class="mono gold" style="font-size:13px;font-weight:700">'+l.key+'</span> <button class="btn bg" onclick="copyKey(\''+l.key+'\')" style="font-size:9px;padding:2px 6px">Copy</button></div>'+badge(l.status)+'</div>';
      if(l.status==='active'){
        h+='<div style="background:#0f172a;border-radius:6px;padding:10px;margin-bottom:8px"><div style="font-size:10px;color:#94a3b8;margin-bottom:4px">Device Chip ID:</div><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span class="mono" style="color:#22c55e;font-size:14px;font-weight:700;letter-spacing:1px">'+(l.chip_id||'-')+'</span><button class="btn bg" onclick="copyKey(\''+(l.chip_id||'')+'\')" style="font-size:9px;padding:2px 6px">Copy</button></div><div style="font-size:10px;color:#94a3b8">Activated: '+fmtDate(l.activated_at)+' | Transfers: '+l.transfer_count+'/'+l.max_transfers+'</div></div>'
        +'<div class="dv"><div style="font-size:11px;color:#f59e0b;font-weight:600;margin-bottom:6px">ESP32 damaged? Transfer or Revoke</div><div style="font-size:10px;color:#94a3b8;margin-bottom:8px">Enter Chip ID to confirm:</div><input id="cf_'+l.key.replace(/-/g,'')+'" placeholder="Enter Chip ID" class="mono" style="width:100%;padding:8px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#fbbf24;font-size:12px;text-transform:uppercase;text-align:center;margin-bottom:8px"><div class="g2"><button class="btn by full" onclick="doTransfer(\''+l.key+'\',\'cf_'+l.key.replace(/-/g,'')+'\')">Transfer</button><button class="btn bd full" onclick="doRevoke(\''+l.key+'\',\'cf_'+l.key.replace(/-/g,'')+'\')">Revoke</button></div></div>';
      }else if(l.status==='inactive'){
        h+='<div style="background:#14532d;border-radius:6px;padding:10px;margin-bottom:6px;border:1px solid #22c55e"><div style="color:#22c55e;font-weight:700;font-size:12px;margin-bottom:4px">Ready to activate!</div><div style="color:#bbf7d0;font-size:11px;line-height:1.6">1. Flash firmware on ESP32<br>2. Connect WiFi (CARWASH_VENDO)<br>3. Open 192.168.4.1 → set WiFi<br>4. <strong style="color:#fcd34d">Internet required!</strong><br>5. Enter: <strong class="gold">'+l.key+'</strong> <button class="btn bg" onclick="copyKey(\''+l.key+'\')" style="font-size:9px;padding:1px 6px">Copy</button><br>6. Activates via server</div></div><div style="font-size:10px;color:#94a3b8">Transfers: '+l.transfer_count+'/'+l.max_transfers+'</div>';
      }else if(l.status==='suspended'){h+='<div class="warn">Suspended. Contact: 09465363493</div>';}
      h+='</div>';
    });
    el.innerHTML=h;}catch(e){el.innerHTML='<div class="warn">Error: '+e.message+'</div>';}
  }else if(state.tab==='buy'){
    el.innerHTML='<div class="card"><h2>Buy License — ₱'+(siteSettings.price||500)+'</h2><div style="font-size:12px;color:#94a3b8;margin-bottom:12px">Send payment, then submit proof:</div>'+[{n:'GCash',num:'0946-536-3493'},{n:'Maya',num:'0995-615-6375'},{n:'BDO',num:'0012-3456-7890'}].map(function(p){return'<div style="background:#0f172a;border-radius:6px;padding:8px;margin-bottom:4px;display:flex;justify-content:space-between"><span style="color:#f59e0b;font-weight:600;font-size:12px">'+p.n+'</span><span class="mono" style="color:#e2e8f0;font-size:12px">'+p.num+'</span></div>'}).join('')+'<div style="margin-top:12px"><div class="fg"><select id="pm"><option>GCash</option><option>Maya</option><option>Bank Transfer</option></select></div><div class="fg"><input id="pr" placeholder="Reference Number"></div><button class="btn bs full" onclick="submitPay()">Submit Payment</button></div></div>';
  }else if(state.tab==='logs'){
    try{const lics=await dbGet('licenses','customer_id=eq.'+state.user.id+'&select=key');const keys=(lics||[]).map(function(l){return l.key});
    let allLogs=[];for(const k of keys){const logs=await dbGet('logs','license_key=eq.'+encodeURIComponent(k)+'&select=*&order=timestamp.desc&limit=20');if(logs)allLogs=allLogs.concat(logs);}
    allLogs.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp)});
    let h='';allLogs.slice(0,30).forEach(function(l){var c=l.action.indexOf('activ')>=0||l.action.indexOf('approv')>=0?'green':l.action.indexOf('revok')>=0||l.action.indexOf('susp')>=0?'red':l.action==='verify'?'blue':'yellow';
    h+='<div class="logrow"><div>'+badge(l.action)+'<div style="font-size:10px;color:#94a3b8;margin-top:3px">'+(l.details||'')+'</div></div><div class="meta">'+fmtDate(l.timestamp)+(l.chip_id?'<br><span class="mono" style="font-size:8px">'+l.chip_id+'</span>':'')+'</div></div>';});
    el.innerHTML=h||'<div style="text-align:center;color:#64748b;padding:30px">No activity</div>';}catch(e){el.innerHTML='<div class="warn">Error</div>';}
  }
}

async function claimKey(){const k=($('ck')||{}).value;if(!k)return;try{const lics=await dbGet('licenses','key=eq.'+encodeURIComponent(k.toUpperCase().trim())+'&select=*');if(!lics||!lics.length){showMsg('er','Invalid key');return;}const l=lics[0];if(l.customer_id&&l.customer_id!==state.user.id){showMsg('er','Belongs to another customer');return;}if(l.customer_id===state.user.id){showMsg('er','Already yours');return;}await dbPatch('licenses','key=eq.'+encodeURIComponent(k.toUpperCase().trim()),{customer_id:state.user.id});await addLog('claimed',k,null,'Customer claimed');showMsg('ok','Claimed!');loadCustData();}catch(e){showMsg('er','Error');}}

async function doTransfer(key,inputId){const chip=($(inputId)||{}).value;if(!chip||!chip.trim()){showMsg('er','Enter Chip ID to confirm');return;}try{const lics=await dbGet('licenses','key=eq.'+encodeURIComponent(key)+'&select=*');if(!lics||!lics.length){showMsg('er','Not found');return;}const l=lics[0];if(l.transfer_count>=l.max_transfers){showMsg('er','Transfer limit reached');return;}if(chip.toUpperCase().trim()!==(l.chip_id||'').toUpperCase().trim()){showMsg('er','Chip ID does not match');return;}await dbPatch('licenses','key=eq.'+encodeURIComponent(key),{status:'inactive',chip_id:null,activated_at:null,transfer_count:l.transfer_count+1});try{await dbDelete('devices','chip_id=eq.'+encodeURIComponent(l.chip_id));}catch(e){}await addLog('transfer',key,l.chip_id,'Transfer #'+(l.transfer_count+1));showMsg('ok','Transferred! Enter key on new ESP32.');loadCustData();}catch(e){showMsg('er','Error');}}

async function doRevoke(key,inputId){const chip=($(inputId)||{}).value;if(!chip||!chip.trim()){showMsg('er','Enter Chip ID to confirm');return;}try{const lics=await dbGet('licenses','key=eq.'+encodeURIComponent(key)+'&select=*');if(!lics||!lics.length){showMsg('er','Not found');return;}const l=lics[0];if(chip.toUpperCase().trim()!==(l.chip_id||'').toUpperCase().trim()){showMsg('er','Chip ID does not match');return;}await dbPatch('licenses','key=eq.'+encodeURIComponent(key),{status:'inactive',chip_id:null,activated_at:null});try{if(l.chip_id)await dbDelete('devices','chip_id=eq.'+encodeURIComponent(l.chip_id));}catch(e){}await addLog('revoke',key,l.chip_id,'Customer revoked');showMsg('ok','Revoked.');loadCustData();}catch(e){showMsg('er','Error');}}

async function submitPay(){try{await dbPost('pending_payments',{customer_id:state.user.id,customer_name:state.user.name,amount:siteSettings.price||500,method:($('pm')||{}).value||'GCash',ref_number:($('pr')||{}).value||''});showMsg('ok','Submitted! Key appears once verified.');state.tab='licenses';loadCustData();}catch(e){showMsg('er','Error');}}

// ==================== ADMIN ====================
function renderAdmin(){
  if(!state.user||state.userType!=='admin'){nav('landing');return'';}
  return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><div style="color:#f59e0b;font-size:16px;font-weight:700">Admin Portal</div><div style="color:#94a3b8;font-size:11px">N&R SOLARTECH</div></div><button class="btn bd" onclick="logout()" style="font-size:10px;padding:5px 10px">Logout</button></div>'
  +'<div class="tabs">'+[['dashboard','Dashboard'],['payments','Payments'],['licenses','Licenses'],['customers','Customers'],['devices','Devices'],['logs','Logs'],['settings','Settings']].map(function(t){return'<button class="'+(state.adminTab===t[0]?'active':'')+'" onclick="state.adminTab=\''+t[0]+'\';loadAdminData()">'+t[1]+'</button>'}).join('')+'</div>'
  +'<div id="ac"><div style="text-align:center;padding:30px;color:#64748b">Loading...</div></div>';
}

async function loadAdminData(){
  const el=$('ac');if(!el)return;
  try{
    const[lics,custs,devs,logs,pays,sets]=await Promise.all([dbGet('licenses','select=*&order=created_at.desc'),dbGet('customers','select=*&order=created_at.desc'),dbGet('devices','select=*&order=last_seen.desc'),dbGet('logs','select=*&order=timestamp.desc&limit=50'),dbGet('pending_payments','select=*&order=submitted_at.desc'),dbGet('site_settings','id=eq.1')]);
    const active=lics.filter(function(l){return l.status==='active'}).length;
    const revenue=logs.filter(function(l){return l.action==='payment_approved'}).length*(siteSettings.price||500);
    const pending=pays.filter(function(p){return p.status==='pending'}).length;
    let h='';

    if(state.adminTab==='dashboard'){
      h='<div class="row" style="margin-bottom:8px"><div class="stat"><div class="v" style="color:#38bdf8">'+lics.length+'</div><div class="l">Total</div></div><div class="stat"><div class="v" style="color:#22c55e">'+active+'</div><div class="l">Active</div></div><div class="stat"><div class="v" style="color:#f59e0b">₱'+revenue+'</div><div class="l">Revenue</div></div></div><div class="row" style="margin-bottom:12px"><div class="stat"><div class="v" style="color:#a78bfa">'+custs.length+'</div><div class="l">Customers</div></div><div class="stat"><div class="v" style="color:#38bdf8">'+devs.length+'</div><div class="l">Devices</div></div><div class="stat"><div class="v" style="color:'+(pending?'#ef4444':'#64748b')+'">'+pending+'</div><div class="l">Pending</div></div></div><div class="card"><div style="color:#94a3b8;font-size:11px;margin-bottom:8px">Quick Actions</div><div class="row"><button class="btn bs" onclick="createLic(1)">+ Create License</button><button class="btn bv" onclick="createLic(5)">Bulk (5)</button></div></div>';
    }else if(state.adminTab==='payments'){
      if(!pays.length)h='<div style="text-align:center;color:#64748b;padding:30px">No payments</div>';
      pays.forEach(function(p){h+='<div class="card" style="'+(p.status==='pending'?'border:1px solid #f59e0b':'')+'"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:600;font-size:13px">'+p.customer_name+'</span>'+badge(p.status)+'</div><div style="font-size:11px;color:#94a3b8">'+p.method+' | ₱'+p.amount+' | Ref: '+p.ref_number+'</div><div style="font-size:10px;color:#64748b">'+fmtDate(p.submitted_at)+'</div>'+(p.status==='pending'?'<div class="row" style="margin-top:8px"><button class="btn bs" onclick="approvePay(\''+p.id+'\',\''+p.customer_id+'\',\''+p.customer_name+'\','+p.amount+',\''+p.method+'\')">Approve</button><button class="btn bd" onclick="rejectPay(\''+p.id+'\')">Reject</button></div>':'')+'</div>';});
    }else if(state.adminTab==='licenses'){
      h='<div style="font-size:10px;color:#64748b;margin-bottom:6px">'+lics.length+' license(s)</div>';
      lics.forEach(function(l){var cu=custs.find(function(c){return c.id===l.customer_id});h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div><span class="mono gold" style="font-size:12px;font-weight:700">'+l.key+'</span> <button class="btn bg" onclick="copyKey(\''+l.key+'\')" style="font-size:9px;padding:1px 5px">Copy</button></div>'+badge(l.status)+'</div><div style="font-size:10px;color:#94a3b8">'+(cu?cu.name:'Unassigned')+(l.chip_id?' | '+l.chip_id:'')+' | T:'+l.transfer_count+'/'+l.max_transfers+'</div><div class="row" style="margin-top:6px">'+(l.status==='active'?'<button class="btn by" style="font-size:10px;padding:4px 10px" onclick="adminSuspend(\''+l.key+'\')">Suspend</button>':'')+(l.status==='suspended'||l.status==='revoked'?'<button class="btn bs" style="font-size:10px;padding:4px 10px" onclick="adminReactivate(\''+l.key+'\')">Reactivate</button>':'')+(l.status!=='revoked'?'<button class="btn bd" style="font-size:10px;padding:4px 10px" onclick="adminRevoke(\''+l.key+'\')">Revoke</button>':'')+'</div></div>';});
    }else if(state.adminTab==='customers'){
      custs.forEach(function(c){var cl=lics.filter(function(l){return l.customer_id===c.id});h+='<div class="card"><div style="display:flex;justify-content:space-between"><span style="font-weight:600;font-size:13px">'+c.name+'</span><span style="color:#38bdf8;font-size:11px">'+cl.length+' lic</span></div><div style="font-size:10px;color:#94a3b8">'+(c.phone||'')+' | '+c.email+' | '+fmtDate(c.created_at)+'</div>'+cl.map(function(l){return'<div style="font-size:10px;margin-top:2px"><span class="mono gold">'+l.key+'</span> '+badge(l.status)+'</div>'}).join('')+'</div>';});
    }else if(state.adminTab==='devices'){
      if(!devs.length)h='<div style="text-align:center;color:#64748b;padding:30px">No devices</div>';
      devs.forEach(function(d){h+='<div class="card"><div style="display:flex;justify-content:space-between"><span class="mono" style="color:#22c55e;font-size:12px;font-weight:700">'+d.chip_id+'</span><span class="badge blue">'+(d.firmware_version||'?')+'</span></div><div style="font-size:10px;color:#94a3b8">Key: <span class="mono gold">'+(d.license_key||'-')+'</span> | '+fmtDate(d.last_seen)+' | '+(d.ip_address||'')+'</div></div>';});
    }else if(state.adminTab==='logs'){
      h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;color:#94a3b8">'+logs.length+' entries</span><button class="btn bd" style="font-size:10px;padding:4px 10px" onclick="clearLogs()">Clear All</button></div>';
      logs.forEach(function(l){var c=l.action.indexOf('activ')>=0||l.action.indexOf('approv')>=0||l.action==='created'?'green':l.action.indexOf('revok')>=0||l.action.indexOf('susp')>=0?'red':l.action==='verify'?'blue':'yellow';h+='<div class="logrow"><div>'+badge(l.action)+'<div style="font-size:9px;color:#94a3b8;margin-top:2px">'+(l.license_key||'')+' '+(l.details?'- '+l.details:'')+'</div></div><div class="meta">'+fmtDate(l.timestamp)+'</div></div>';});
    }else if(state.adminTab==='settings'){
      var S=sets&&sets[0]?sets[0]:siteSettings;
      h='<div class="card"><h2>Firmware</h2><div class="g2"><div class="fg"><label>LCD Filename</label><input id="sf1" value="'+(S.lcd_firmware||'')+'"></div><div class="fg"><label>LCD Version</label><input id="sf2" value="'+(S.lcd_version||'')+'"></div><div class="fg"><label>7-Seg Filename</label><input id="sf3" value="'+(S.seg_firmware||'')+'"></div><div class="fg"><label>7-Seg Version</label><input id="sf4" value="'+(S.seg_version||'')+'"></div></div></div><div class="card"><h2>Instructions</h2><div class="fg"><label>Flash Instructions</label><textarea id="sf5" rows="5" style="font-family:monospace;font-size:11px">'+(S.flash_instructions||'')+'</textarea></div><div class="fg"><label>Wiring Guide</label><textarea id="sf6" rows="4" style="font-family:monospace;font-size:11px">'+(S.wiring_guide||'')+'</textarea></div></div><div class="card"><h2>Site</h2><div class="fg"><label>Price</label><input id="sf7" type="number" value="'+(S.price||500)+'"></div><div class="fg"><label>Announcement</label><input id="sf8" value="'+(S.announcement||'')+'"></div></div><button class="btn bs full" onclick="saveSettings()">Save Settings</button>';
    }
    el.innerHTML=h;
  }catch(e){el.innerHTML='<div class="warn">Error: '+e.message+'</div>';}
}

async function createLic(n){try{var keys=[];for(var i=0;i<n;i++){var k=genKey();await dbPost('licenses',{key:k,type:'permanent',status:'inactive'});await addLog('created',k,null,'Admin');keys.push(k);}showMsg('ok','Created: '+keys.join(', '));loadAdminData();}catch(e){showMsg('er','Error');}}
async function approvePay(id,custId,custName,amt,method){try{await dbPatch('pending_payments','id=eq.'+id,{status:'approved'});var k=genKey();await dbPost('licenses',{key:k,type:'permanent',status:'inactive',customer_id:custId});await addLog('payment_approved',k,null,method+' P'+amt+' '+custName);showMsg('ok','Approved! Key: '+k);loadAdminData();}catch(e){showMsg('er','Error');}}
async function rejectPay(id){try{await dbPatch('pending_payments','id=eq.'+id,{status:'rejected'});showMsg('ok','Rejected');loadAdminData();}catch(e){showMsg('er','Error');}}
async function adminSuspend(key){try{await dbPatch('licenses','key=eq.'+encodeURIComponent(key),{status:'suspended'});await addLog('suspended',key,null,'Admin');showMsg('ok','Suspended');loadAdminData();}catch(e){showMsg('er','Error');}}
async function adminRevoke(key){try{await dbPatch('licenses','key=eq.'+encodeURIComponent(key),{status:'revoked',chip_id:null});await addLog('revoked',key,null,'Admin');showMsg('ok','Revoked');loadAdminData();}catch(e){showMsg('er','Error');}}
async function adminReactivate(key){try{await dbPatch('licenses','key=eq.'+encodeURIComponent(key),{status:'inactive'});await addLog('reactivated',key,null,'Admin');showMsg('ok','Reactivated');loadAdminData();}catch(e){showMsg('er','Error');}}
async function clearLogs(){try{await dbDelete('logs','id=neq.00000000-0000-0000-0000-000000000000');showMsg('ok','Cleared');loadAdminData();}catch(e){showMsg('er','Error');}}
async function saveSettings(){try{await dbPatch('site_settings','id=eq.1',{lcd_firmware:($('sf1')||{}).value,lcd_version:($('sf2')||{}).value,seg_firmware:($('sf3')||{}).value,seg_version:($('sf4')||{}).value,flash_instructions:($('sf5')||{}).value,wiring_guide:($('sf6')||{}).value,price:parseInt(($('sf7')||{}).value)||500,announcement:($('sf8')||{}).value});showMsg('ok','Saved!');siteSettings.price=parseInt(($('sf7')||{}).value)||500;}catch(e){showMsg('er','Error');}}

async function init(){try{const r=await dbGet('site_settings','id=eq.1');if(r&&r[0])siteSettings=r[0];}catch(e){}render();}
init();
</script>
