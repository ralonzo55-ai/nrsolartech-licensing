<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>N&R SOLARTECH</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.app{max-width:620px;margin:0 auto;padding:16px;width:100%}
h1{font-size:26px;font-weight:800;color:#fff;text-align:center}
h2{font-size:15px;font-weight:600;color:#38bdf8}
.card{background:#1e293b;border-radius:12px;padding:12px;margin-bottom:8px;animation:slideUp .3s ease}
.card h2{margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #334155}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes spin{to{transform:rotate(360deg)}}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:11px;color:#94a3b8;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:14px;transition:border .2s}
.fg input:focus,.fg textarea:focus{border-color:#38bdf8;outline:none;box-shadow:0 0 0 2px rgba(56,189,248,.15)}
.btn{padding:9px 18px;border:none;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}.btn:hover{opacity:.9;transform:translateY(-1px)}
.bp{background:#0ea5e9;color:#fff}.bs{background:#22c55e;color:#fff}
.bd{background:#dc2626;color:#fff}.by{background:#f59e0b;color:#fff}
.bg{background:#334155;color:#94a3b8}.bv{background:#8b5cf6;color:#fff}
.btn.full{width:100%}
.badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;display:inline-block;letter-spacing:.5px}
.badge.green{background:#065f46;color:#6ee7b7}.badge.red{background:#7f1d1d;color:#fca5a5}
.badge.yellow{background:#78350f;color:#fcd34d}.badge.blue{background:#1e3a5f;color:#93c5fd}
.badge.gray{background:#374151;color:#d1d5db}
.stat{background:#0f172a;border-radius:10px;padding:14px;text-align:center;flex:1;min-width:80px}
.stat .v{font-size:22px;font-weight:800;font-family:monospace}
.stat .l{font-size:9px;color:#94a3b8;text-transform:uppercase;margin-top:4px;letter-spacing:1px}
.msg{padding:12px;border-radius:10px;margin-bottom:12px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;animation:fadeIn .2s}
.pbar{width:100%;height:6px;background:#334155;border-radius:3px;overflow:hidden;margin-top:6px}.pbar .fill{height:100%;background:#22c55e;border-radius:3px;transition:width .2s;width:0%}
.msg.ok{background:linear-gradient(135deg,#166534,#14532d);color:#fff;border:1px solid #22c55e}.msg.er{background:linear-gradient(135deg,#991b1b,#7f1d1d);color:#fff;border:1px solid #dc2626}
.row{display:flex;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tabs button{padding:7px 14px;background:#1e293b;border:none;border-radius:8px;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.tabs button:hover{background:#334155;color:#e2e8f0}
.tabs button.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0f172a;box-shadow:0 2px 8px rgba(245,158,11,.3)}
.tabs button.activeb{background:linear-gradient(135deg,#38bdf8,#0ea5e9);color:#0f172a;box-shadow:0 2px 8px rgba(56,189,248,.3)}
.mono{font-family:monospace}.gold{color:#fbbf24}
.dv{border-top:1px solid #334155;margin-top:12px;padding-top:12px}
.ft{text-align:center;font-size:10px;color:#64748b;padding:16px 0}
.ft a{color:#38bdf8;text-decoration:none}
.logrow{background:#1e293b;border-radius:8px;padding:10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.logrow .meta{font-size:9px;color:#64748b;text-align:right}
.price-box{background:linear-gradient(135deg,#14532d,#166534);border:2px solid #22c55e;border-radius:12px;padding:12px;margin-bottom:8px;text-align:center;box-shadow:0 4px 20px rgba(34,197,94,.15)}
.price-box .amt{font-size:40px;font-weight:800;color:#fff;text-shadow:0 2px 10px rgba(255,255,255,.1)}
.warn{background:#7f1d1d;border:1px solid #dc2626;border-radius:8px;padding:10px;font-size:11px;color:#fca5a5}
.loading{text-align:center;padding:30px;color:#64748b}
.pmrow{background:#0f172a;border-radius:8px;padding:8px 10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.hero{text-align:center;padding:24px 0 14px;background:linear-gradient(180deg,rgba(56,189,248,.08) 0%,transparent 100%);border-radius:20px;margin-bottom:10px}
.hero .brand{font-size:13px;color:#f59e0b;font-weight:700;letter-spacing:4px;cursor:default;user-select:none}
.hero h1{margin-top:8px;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:#94a3b8;font-size:14px;margin-top:8px}
.trust{display:flex;justify-content:center;gap:20px;margin-top:16px}
.trust .ti{text-align:center}
.trust .tv{font-size:20px;font-weight:800;color:#22c55e}
.trust .tl{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.hiw{display:flex;gap:8px;margin-top:12px}
.hiw .step{flex:1;background:#0f172a;border-radius:10px;padding:12px 8px;text-align:center;position:relative}
.hiw .sn{width:28px;height:28px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#0f172a;margin:0 auto 8px}
.hiw .st{font-size:11px;color:#e2e8f0;line-height:1.4}
.faq-item{background:#0f172a;border-radius:10px;margin-bottom:6px;overflow:hidden;border:1px solid #1e293b;transition:border .2s}
.faq-item:hover{border-color:#334155}
.faq-q{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:#e2e8f0}
.faq-q .arrow{color:#f59e0b;font-size:16px;transition:transform .2s}
.faq-a{padding:0 14px 12px;font-size:12px;color:#94a3b8;line-height:1.6;display:none}
.faq-item.open .faq-a{display:block}.faq-item.open .arrow{transform:rotate(180deg)}
.social{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.social a{background:#1e293b;border-radius:8px;padding:8px 14px;text-decoration:none;color:#e2e8f0;font-size:10px;font-weight:600;transition:all .15s;border:1px solid #334155}
.social a:hover{background:#334155;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.social a .si{font-size:14px;display:block;margin-bottom:1px}
.search-box{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:13px;width:100%;margin-bottom:10px}
.search-box:focus{border-color:#38bdf8;outline:none}
@media(min-width:768px){.app{max-width:740px;padding:24px}h1{font-size:30px}.card{padding:20px}.stat .v{font-size:26px}.btn{padding:10px 22px;font-size:13px}.fg input,.fg select,.fg textarea{padding:11px;font-size:15px}.tabs button{padding:9px 18px;font-size:12px}.price-box{padding:28px}.price-box .amt{font-size:48px}.hero{padding:50px 0 24px}.hiw .st{font-size:12px}}
@media(min-width:1024px){.app{max-width:920px;padding:32px}h1{font-size:34px}.card{padding:22px}.stat{padding:18px}.stat .v{font-size:30px}.g2{gap:14px}.price-box{padding:32px}.price-box .amt{font-size:56px}}
@media(max-width:380px){.app{padding:10px}h1{font-size:20px}.g2{grid-template-columns:1fr;gap:6px}.hiw{flex-direction:column}.stat .v{font-size:18px}.stat{min-width:60px;padding:10px}.price-box .amt{font-size:30px}.tabs button{padding:5px 10px;font-size:10px}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SB='https://sdviemivuftnsytmnqaq.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkdmllbWl2dWZ0bnN5dG1ucWFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzAwMTcsImV4cCI6MjA4ODYwNjAxN30.iRSuCtEullsSaV_1hYAqPj_sywXdy-4U3WfHjIYCB4U';
async function pubGet(t,q){const r=await fetch(SB+'/rest/v1/'+t+'?'+(q||'select=*'),{headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Accept':'application/json'}});if(!r.ok)throw new Error(await r.text());return r.json();}
let authToken=localStorage.getItem('nr_token')||'';
function saveToken(t){authToken=t;if(t)localStorage.setItem('nr_token',t);else localStorage.removeItem('nr_token');}
function saveUser(u,t){if(u)localStorage.setItem('nr_user',JSON.stringify(u));else localStorage.removeItem('nr_user');if(t)localStorage.setItem('nr_ut',t);else localStorage.removeItem('nr_ut');}
function loadUser(){try{var u=JSON.parse(localStorage.getItem('nr_user'));var t=localStorage.getItem('nr_ut');if(u&&authToken){ST.user=u;ST.ut=t;}}catch(e){}}
async function api(body){const h={'Content-Type':'application/json'};if(authToken)h['Authorization']='Bearer '+authToken;const r=await fetch('/api',{method:'POST',headers:h,body:JSON.stringify(body)});const d=await r.json();if(!r.ok){if(r.status===401&&body.action!=='login'&&body.action!=='register'&&body.action!=='admin_login'){saveToken('');saveUser(null,null);ST.user=null;ST.ut=null;nav('landing');showMsg('er','Session expired. Please login again.');}throw new Error(d.error||d.message||'Error');}return d;}
function $(id){return document.getElementById(id)}
function fd(d){return d?new Date(d).toLocaleString():'-'}
function bg(s){const c={active:'green',inactive:'yellow',suspended:'red',revoked:'gray',pending:'yellow',approved:'green',rejected:'red',Available:'yellow',Activated:'green'};return'<span class="badge '+(c[s]||'gray')+'">'+s+'</span>';}
function ck(k){try{navigator.clipboard.writeText(k)}catch(e){}showMsg('ok','Copied!')}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let ST={page:'landing',user:null,ut:null,msg:null,tab:'licenses',at:'dashboard'};
let SS={},PM=[],DL=[],PD=[],AD={},tapN=0,tapT=null,searchQ='';
let custCache=null; // Cache customer data

function showMsg(t,m){
  // Use floating toast - don't re-render page
  var old=$('toast');if(old)old.remove();
  var d=document.createElement('div');d.id='toast';d.className='msg '+t;d.textContent=m;d.onclick=function(){d.remove();};
  document.body.appendChild(d);
  Object.assign(d.style,{position:'fixed',top:'12px',left:'50%',transform:'translateX(-50%)',zIndex:'9999',maxWidth:'90%',width:'500px'});
  setTimeout(function(){if(d.parentNode)d.remove();},3000);
}
async function nav(p){ST.page=p;render();if(p==='landing'){var [ss,pm,dl,pd]=await Promise.all([pubGet('site_settings','id=eq.1').catch(function(){return [];}),pubGet('payment_methods','active=eq.true&order=sort_order').catch(function(){return [];}),pubGet('downloads','active=eq.true&order=sort_order').catch(function(){return [];}),pubGet('products','active=eq.true&order=sort_order').catch(function(){return [];})]);if(ss&&ss[0])SS=ss[0];PM=pm||[];DL=dl||[];PD=pd||[];render();}}
function logoTap(){tapN++;if(tapT)clearTimeout(tapT);if(tapN>=5){tapN=0;nav('adminLogin');return;}tapT=setTimeout(()=>tapN=0,2000);}
function logout(){ST.user=null;ST.ut=null;saveToken('');saveUser(null,null);try{sessionStorage.removeItem('nrActive');}catch(e){}nav('landing');}
function togFaq(el){el.parentElement.classList.toggle('open');}

function render(){
  const a=$('app');let h='';
  switch(ST.page){
    case'landing':h+=pgLanding();break;case'customerLogin':h+=pgLogin('Customer Login','#38bdf8','doLogin');break;
    case'register':h+=pgRegister();break;case'forgot':h+=pgForgot();break;case'adminLogin':h+=pgLogin('Developer Login','#f59e0b','doAdminLogin');break;case'adminForgot':h+=pgAdminForgot();break;
    case'customer':h+=pgCustomer();break;case'admin':h+=pgAdmin();break;default:h+=pgLanding();
  }
  a.innerHTML=h;
  if(ST.page==='customer')setTimeout(loadCust,50);
  if(ST.page==='admin')setTimeout(loadAdmin,50);
}

// ====== LANDING ======
function pgLanding(){
  var s=SS,pm=PM||[];
  var features=(s.features||'').split(',').filter(Boolean);
  var hiw=(s.how_it_works||'').split(',').filter(Boolean);
  var faqRaw=(s.faq||'').split('||').filter(Boolean);
  var faqs=faqRaw.map(function(f){var p=f.split('|');return{q:p[0]||'',a:p[1]||''};});

  var h='<div class="hero"><div class="brand" onclick="logoTap()">'+esc(s.brand_name||'N&R SOLARTECH')+'</div><h1>'+esc(s.site_title||'Smart CarWash')+'</h1><p>'+esc(s.site_subtitle||'')+'</p>'
  +'<div class="trust"><div class="ti"><div class="tv">'+(s.customers_count||'50+')+'</div><div class="tl">'+(s.trust_label1||'Customers')+'</div></div><div class="ti"><div class="tv" style="color:#38bdf8">'+(s.trust_value2||'24/7')+'</div><div class="tl">'+(s.trust_label2||'Support')+'</div></div><div class="ti"><div class="tv" style="color:#f59e0b">'+(s.trust_value3||'Free')+'</div><div class="tl">'+(s.trust_label3||'Updates')+'</div></div></div></div>';

  // How it works
  if(hiw.length){h+='<div class="card"><h2>How It Works</h2><div class="hiw">';hiw.forEach(function(s,i){h+='<div class="step"><div class="sn">'+(i+1)+'</div><div class="st">'+esc(s.trim())+'</div></div>';});h+='</div></div>';}

  // Features
  if(features.length){h+='<div class="card"><h2>Features</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 8px">';features.forEach(function(f){h+='<div style="display:flex;align-items:center;gap:6px;padding:3px 0"><span style="color:#22c55e;font-size:12px">✓</span><span style="font-size:12px">'+esc(f.trim())+'</span></div>';});h+='</div></div>';}

  // Products (firmware + pricing)
  if(PD.length){
    h+='<div class="card"><h2>Products & Firmware</h2><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">';
    PD.forEach(function(p){h+='<button class="btn full" style="flex:1;min-width:120px;max-width:calc(50% - 4px);padding:10px;border-radius:10px;background:'+esc(p.color||'#0ea5e9')+';color:#fff" onclick="dlProduct(\''+esc(p.firmware_file)+'\')"><div style="font-size:13px;font-weight:700">'+esc(p.name)+'</div><div style="font-size:8px;opacity:.5;margin-top:2px">Tap to Download</div></button>';});
    h+='</div>'+(s.flash_instructions?'<details style="margin-top:10px"><summary style="font-size:12px;color:#94a3b8;cursor:pointer">📋 Flashing Instructions</summary><pre style="font-size:11px;color:#cbd5e1;background:#0f172a;border-radius:8px;padding:10px;margin-top:6px;white-space:pre-wrap;border:1px solid #334155">'+esc(s.flash_instructions)+'</pre></details>':'')+'</div>';
    // Price cards per product
    h+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;justify-content:center">';
    PD.forEach(function(p){h+='<div style="flex:1;min-width:120px;max-width:calc(33.3% - 6px);background:linear-gradient(135deg,#14532d,#166534);border:1px solid '+(p.color||'#22c55e')+';border-radius:10px;padding:10px;text-align:center"><div style="font-size:10px;color:'+esc(p.color||'#86efac')+';font-weight:700">'+esc(p.name)+'</div><div style="font-size:8px;color:#86efac;letter-spacing:1px;margin-top:1px">'+esc(p.price_label||'ONE-TIME PAYMENT')+'</div><div style="font-size:18px;font-weight:800;color:#fff;margin:2px 0">₱'+(p.price||500)+'</div>'+(p.description?'<div style="font-size:8px;color:#94a3b8">'+esc(p.description)+'</div>':'')+'</div>';});
    h+='</div>';
  }
  // Base price (shows when no products, or always as starting price)
  if(!PD.length){
    h+='<div style="display:flex;justify-content:center;margin-bottom:8px"><div style="background:linear-gradient(135deg,#14532d,#166534);border:1px solid #22c55e;border-radius:10px;padding:10px;text-align:center;min-width:160px"><div style="font-size:8px;color:#86efac;letter-spacing:1px">'+esc(s.price_label||'STARTING AT')+'</div><div style="font-size:18px;font-weight:800;color:#fff;margin:2px 0">₱'+(s.price||500)+'</div>'+(s.price_note?'<div style="font-size:8px;color:#94a3b8">'+esc(s.price_note)+'</div>':'')+'</div></div>';
  }

  // Tools & Downloads
  if(DL.length){h+='<div class="card"><h2>🛠 Tools & Downloads</h2>';DL.forEach(function(d){h+='<div class="pmrow" style="margin-bottom:4px"><div><div style="color:#38bdf8;font-weight:700;font-size:12px">'+esc(d.name)+'</div><div style="color:#94a3b8;font-size:10px">'+esc(d.description)+'</div></div><a href="'+esc(d.url)+'" target="_blank" class="btn bp" style="font-size:10px;padding:5px 10px;border-radius:8px;text-decoration:none">Download</a></div>';});h+='</div>';}

  // Video Tutorials
  var vtLanding=[];try{vtLanding=JSON.parse(SS.tutorial_videos||'[]');}catch(e){}
  if(vtLanding.length){
    h+='<div class="card"><h2>🎬 Video Tutorials</h2>';
    vtLanding.forEach(function(v){
      var ytId='';var ytMatch=(v.url||'').match(/(?:youtu\.be\/([^?&\n]+)|youtube\.com\/(?:watch\?v=|embed\/|shorts\/)([^&?\n]+))/);
      if(ytMatch)ytId=ytMatch[1]||ytMatch[2]||'';
      if(ytId){h+='<div class="pmrow" style="margin-bottom:10px;align-items:flex-start"><img src="https://img.youtube.com/vi/'+encodeURIComponent(ytId)+'/mqdefault.jpg" style="width:100px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0;border:1px solid #334155"><div style="flex:1;min-width:0;margin-left:10px"><div style="color:#a78bfa;font-weight:700;font-size:13px;margin-bottom:6px">'+esc(v.title)+'</div><a href="'+esc(v.url)+'" target="_blank" class="btn" style="background:#a78bfa;color:#fff;font-size:10px;padding:5px 12px;border-radius:8px;text-decoration:none">▶ Watch</a></div></div>';}
      else{h+='<div class="pmrow" style="margin-bottom:8px"><div><div style="color:#a78bfa;font-weight:700;font-size:13px">'+esc(v.title)+'</div></div><a href="'+esc(v.url)+'" target="_blank" class="btn" style="background:#a78bfa;color:#fff;font-size:10px;padding:5px 12px;border-radius:8px;text-decoration:none">▶ Watch</a></div>';}
    });
    h+='</div>';
  }

  // Payment
  if(pm.length){h+='<div class="card"><h2>Payment Methods</h2>';pm.forEach(function(p){h+='<div class="pmrow"><div><div style="color:#f59e0b;font-weight:700;font-size:13px">'+esc(p.name)+'</div><div style="color:#e2e8f0;font-size:11px">'+esc(p.account_holder)+'</div></div><div class="mono" style="color:#e2e8f0;font-weight:700;font-size:14px">'+esc(p.account_number)+'</div></div>';});h+='</div>';}

  // FAQ
  if(faqs.length&&faqs[0].q){h+='<div class="card"><h2>Frequently Asked Questions</h2>';faqs.forEach(function(f){h+='<div class="faq-item"><div class="faq-q" onclick="togFaq(this)"><span>'+esc(f.q)+'</span><span class="arrow">▼</span></div><div class="faq-a">'+esc(f.a)+'</div></div>';});h+='</div>';}

  // Contact & Social
  h+='<div class="card" style="text-align:center;padding:12px"><h2 style="margin-bottom:6px;padding-bottom:6px">Contact & Support</h2><div style="color:#94a3b8;font-size:11px;margin-bottom:6px">'+esc(s.support_text||'')+'</div>'
  +'<div style="font-size:14px;font-weight:700;color:#38bdf8;margin-bottom:8px">'+esc(s.contact_phone||'')+'</div>'
  +'<div class="social">'
  +(s.social_facebook?'<a href="'+esc(s.social_facebook)+'" target="_blank"><div class="si">👥</div>Facebook</a>':'')
  +(s.social_fbpage?'<a href="'+esc(s.social_fbpage)+'" target="_blank"><div class="si">📄</div>FB Page</a>':'')
  +(s.social_whatsapp?'<a href="'+esc(s.social_whatsapp)+'" target="_blank"><div class="si">💬</div>WhatsApp</a>':'')
  +(s.social_youtube?'<a href="'+esc(s.social_youtube)+'" target="_blank"><div class="si">🎬</div>YouTube</a>':'')
  +'</div></div>';

  // Login buttons
  h+='<div class="g2" style="margin-bottom:14px"><button class="btn full" style="padding:14px;background:#1e293b;border:2px solid #38bdf8;color:#38bdf8;font-weight:700;font-size:14px;border-radius:10px" onclick="nav(\'customerLogin\')">Customer Login</button><button class="btn bp full" style="padding:14px;font-size:14px;border-radius:10px" onclick="nav(\'register\')">Register</button></div>';

async function submitPay(){
  var method=($('paymethod')||{}).value;var ref=($('payref')||{}).value.trim();
  var fileInput=$('proofFile');var file=fileInput&&fileInput.files[0];
  if(!ref)return showMsg('er','Please enter your reference number');

  try{
    showMsg('ok','Uploading proof...');
    var proofUrl='';
    var fname='proof_'+Date.now()+'_'+Math.random().toString(36).substr(2,6)+'.'+file.name.split('.').pop();
    await uploadWithProgress(SB+'/storage/v1/object/proofs/'+fname,file,{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':file.type,'x-upsert':'true'},'pb_proof');
    proofUrl=SB+'/storage/v1/object/public/proofs/'+fname;

    var bp1=SS.bulk_price_1||650,bp2=SS.bulk_price_2||550,bp3=SS.bulk_price_3||500;

    var selProduct='';var pp=$('payproduct');if(pp)selProduct=pp.options[pp.selectedIndex].getAttribute('data-name')||'';

  }catch(e){showMsg('er',e.message);}
}
function updBuyPrice(){
  var qty=parseInt(($('payqty')||{}).value)||1;
  var bp1=SS.bulk_price_1||650,bp2=SS.bulk_price_2||550,bp3=SS.bulk_price_3||500;

  if(qty>=6)perUnit=bp3;
  else if(qty>=3)perUnit=bp2;

}

function downloadGenKeys(){
  var cbs=document.querySelectorAll('.genCb:checked');
  if(!cbs.length)return showMsg('er','Select keys to download');
  var lics=AD.licenses||[];
  var lines=[];
  lines.push('N&R SOLARTECH - Generated License Keys');
  lines.push('Downloaded: '+new Date().toLocaleString());
  lines.push('');
  lines.push('='.repeat(50));
  lines.push('');
  var count=0;
  cbs.forEach(function(cb){
    var l=lics.find(function(x){return x.key===cb.value;});
    if(l){
      count++;
      var sl=l.status==='inactive'?'AVAILABLE':l.status==='active'?'ACTIVATED':l.status==='suspended'?'SUSPENDED':'REVOKED';
      lines.push('  '+count+'.  '+l.key);
      lines.push('      Status:     '+sl);
      lines.push('      Generated:  '+(l.created_at?new Date(l.created_at).toLocaleString():'N/A'));
      lines.push('');
    }
  });
  lines.push('='.repeat(50));
  lines.push('');
  lines.push('  Total: '+count+' license key(s)');
  lines.push('');
  var blob=new Blob([lines.join('\n')],{type:'text/plain'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='NR_Generated_Keys_'+new Date().toISOString().slice(0,10)+'.txt';a.click();
  showMsg('ok','Downloaded '+count+' keys');
}
async function deleteGenKeys(){

  var keys=[];cbs.forEach(function(cb){keys.push(cb.value);});
  var activeKeys=keys.filter(function(k){var l=(AD.licenses||[]).find(function(x){return x.key===k;});return l&&l.status==='active';});
  if(activeKeys.length){return showMsg('er','Cannot delete '+activeKeys.length+' active key(s). Revoke first: '+activeKeys.join(', '));}
  if(!confirm('Delete '+keys.length+' generated key(s)?'))return;
  if(AD.licenses)AD.licenses=AD.licenses.filter(function(l){return keys.indexOf(l.key)===-1;});

}

function renderLogs(){var el=$('logResults');if(!el)return;var logs=AD.logs||[];var q=(searchQ||'').toLowerCase();var d=($('logDate')||{}).value||'';var filtered=logs.filter(function(l){var txt=((l.action||'')+' '+(l.license_key||'')+' '+(l.details||'')+' '+(l.chip_id||'')+' '+(l.ip_address||'')).toLowerCase();if(q&&txt.indexOf(q)<0)return false;if(d&&l.timestamp&&l.timestamp.substring(0,10)!==d)return false;return true;});var h='';filtered.forEach(function(l){h+='<div class="logrow"><div>'+bg(l.action)+'<div style="font-size:10px;color:#94a3b8;margin-top:3px">'+(l.license_key?'<span style="color:#fbbf24">'+esc(l.license_key)+'</span> ':'')+(l.details||'')+'</div></div><div class="meta">'+fd(l.timestamp)+'</div></div>';});el.innerHTML=h||'<div class="loading">No logs found</div>';var cnt=$('logCount');if(cnt)cnt.textContent=filtered.length+' of '+logs.length+' entries';}

function uploadWithProgress(url,file,headers,barId){return new Promise(function(resolve,reject){var xhr=new XMLHttpRequest();xhr.open('PUT',url);Object.keys(headers).forEach(function(k){xhr.setRequestHeader(k,headers[k]);});var bar=$(barId);if(bar){bar.style.display='block';bar.innerHTML='<div style="display:flex;align-items:center;gap:6px;margin-top:6px"><span style="color:#94a3b8;font-size:10px">Uploading</span><div class="pbar" style="flex:1"><div class="fill"></div></div><span class="ptxt" style="color:#22c55e;font-size:10px;font-weight:700">0%</span></div>';}xhr.upload.onprogress=function(e){if(e.lengthComputable&&bar){var pct=Math.round(e.loaded/e.total*100);bar.querySelector('.fill').style.width=pct+'%';bar.querySelector('.ptxt').textContent=pct+'%';}};xhr.onload=function(){if(bar){bar.querySelector('.fill').style.width='100%';bar.querySelector('.ptxt').textContent='✅';setTimeout(function(){bar.style.display='none';},1000);}if(xhr.status>=200&&xhr.status<300)resolve();else reject(new Error(xhr.responseText||'Upload failed'));};xhr.onerror=function(){if(bar){bar.innerHTML='<div style="color:#ef4444;font-size:10px;margin-top:4px">Upload failed</div>';}reject(new Error('Network error'));};xhr.send(file);});}
async function upProductFW(input,id){var file=input.files[0];if(!file)return;if(!file.name.endsWith('.bin')){showMsg('er','Only .bin files!');input.value='';return;}try{var fn=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');await uploadWithProgress(SB+'/storage/v1/object/firmware/'+fn,file,{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/octet-stream','x-upsert':'true'},'pb_'+id.replace(/-/g,''));await api({action:'update_product',id:id,firmware_file:fn});showMsg('ok','✅ '+fn+' uploaded!');loadAdmin(true);}catch(e){showMsg('er',e.message);}input.value='';}

async function init(){
  var hasSession=false;
  try{hasSession=!!sessionStorage.getItem('nrActive');}catch(e){}
  if(!hasSession){
    ST.page='landing';ST.user=null;ST.ut=null;
    saveToken('');saveUser(null,null);authToken='';
  } else {
    loadUser();
  }
  // Show loading spinner while fetching data — prevents half-rendered first paint
  document.getElementById('app').innerHTML='<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px"><div style="width:36px;height:36px;border:3px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin 0.8s linear infinite"></div><div style="color:#94a3b8;font-size:13px">Loading...</div></div>';
  // Fetch all public data in PARALLEL (not sequential)
  var [ss,pm,dl,pd] = await Promise.all([
    pubGet('site_settings','id=eq.1').catch(function(){return [];}),
    pubGet('payment_methods','active=eq.true&order=sort_order').catch(function(){return [];}),
    pubGet('downloads','active=eq.true&order=sort_order').catch(function(){return [];}),
    pubGet('products','active=eq.true&order=sort_order').catch(function(){return [];})
  ]);
  if(ss&&ss[0])SS=ss[0]; PM=pm||[]; DL=dl||[]; PD=pd||[];
  if(ST.user&&authToken){
    try{if(ST.ut==='a'){var r2=await api({action:'dashboard'});AD=r2;ST.page='admin';}else{ST.page='customer';}}catch(e){ST.user=null;ST.ut=null;saveToken('');saveUser(null,null);ST.page='landing';}
  }
  render();
  // Keep session alive every 3 min while page is open and user is logged in
  setInterval(async function(){
    if(!authToken||!ST.user)return;
    try{
      if(ST.ut==='a'){var r=await api({action:'dashboard'});AD=r;render();}
      else await api({action:'my_licenses'});
    }catch(e){/* session expired, api() handles logout */}
  },180000);
  // Auto-refresh admin every 30 seconds - all stats update live
  setInterval(async function(){
    if(!authToken||!ST.user||ST.ut!=='a')return;
    try{
      var r=await api({action:'dashboard'});
      var oldPending=(AD.payments||[]).filter(function(p){return p.status==='pending'}).length;
      AD=r;
      var newPending=(r.payments||[]).filter(function(p){return p.status==='pending'}).length;
      if(newPending>oldPending)showMsg('ok','🔔 New payment received!');
      render();loadAdmin();
    }catch(e){}
  },30000);
  // Auto-refresh customer licenses every 15 seconds for newly approved keys
  setInterval(async function(){
    if(!authToken||!ST.user||ST.ut!=='c')return;
    try{
      var r=await api({action:'my_licenses'});
      var newLics=r.licenses||[];
      var oldCount=(custCache||[]).length;
      if(newLics.length>oldCount){
        custCache=newLics;
        showMsg('ok','🔑 New license key received!');
        ST.tab='new';
        loadCust();
      } else {
        custCache=newLics;
      }
    }catch(e){}
  },15000);
}
// === IDLE AUTO-LOGOUT (2 minutes) ===
var idleTimeout=120000; // 2 minutes
var idleTimer=null;
function resetIdle(){
  if(idleTimer)clearTimeout(idleTimer);
  if(!authToken||!ST.user)return;
  idleTimer=setTimeout(function(){
    if(authToken&&ST.user){
      showMsg('er','Session expired due to inactivity');
      try{sessionStorage.removeItem('nrActive');}catch(x){}
      logout();
    }
  },idleTimeout);
}
['mousedown','touchstart','keydown','scroll','click','mousemove'].forEach(function(e){
  document.addEventListener(e,resetIdle,{passive:true});
});
resetIdle();
init();
</script>
